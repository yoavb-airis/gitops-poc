replicaCount: 1

image:
  repository: us-central1-docker.pkg.dev/airis-artifacts/packages/geo_explainability
  tag: "2026-03-09-T-04-02-07_alpha_9a381a9"

env:
  SHARED_VOLUME: "/data"
  BENTOML_DO_NOT_TRACK: "True"
  TIMEOUT: "1500"
  OPENAI_MODULE: "gpt-4o-mini"

resources:
  limits:
    cpu: 1
    memory: 4Gi
  requests:
    cpu: 1
    memory: 4Gi

gpu:
  enabled: false
  nodeSelector: {}
  tolerations: []
  affinity: {}

postman:
  image:
    repository: "us-central1-docker.pkg.dev/airis-artifacts/packages/postman"
    tag: "2026-03-09-T-04-02-07_alpha_9a381a9"
  env:
    JOB_TYPE: "geo_explainability"
    SHARED_VOLUME: "/data"
    POST_OFFICE_URL: "http://post-office.default.svc.cluster.local:2704"
    INFERENCE_URL: "http://localhost:3000/infer"
    IS_API: "True"
    SLEEP_TIME: "1"
    MONITOR_FLAG: "True"
    TIMEOUT: "550"
    SHOULD_UPLOAD_DIR: "false"
    GOOGLE_APPLICATION_CREDENTIALS: "/secrets/gs-secret.json"
  extraVolumeMounts:
    - name: gs-secret
      mountPath: /secrets
      readOnly: true

envFromSecrets:
  - secretName: geo-explainability-openai-api-key
    keys:
      - OPENAI_API_KEY

service:
  port: 3000

podAnnotations:
  gke-gcsfuse/volumes: "true"
  gke-gcsfuse/cpu-limit: "0"
  gke-gcsfuse/memory-limit: "0"
  gke-gcsfuse/ephemeral-storage-limit: "0"

assetsPvc:
  enabled: true
  claimName: "assets-pvc"
  mountPath: "/home/ubuntu/airis/ai/geo/assets"
  subPath: "airis-environment-assets/geolocation/assets/"
  readOnly: true

extraVolumes:
  - name: gs-secret
    secret:
      secretName: gs-secret
      items:
        - key: gs-secret.json
          path: gs-secret.json

serviceAccount:
  name: airis
